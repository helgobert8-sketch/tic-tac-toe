<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #mode-select {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .mode-btn {
      padding: 0.5rem 1.25rem;
      font-size: 0.95rem;
      border: 2px solid #0f3460;
      border-radius: 8px;
      background: #16213e;
      color: #aaa;
      cursor: pointer;
      transition: all 0.15s;
    }

    .mode-btn.active {
      background: #0f3460;
      border-color: #e94560;
      color: #fff;
    }

    .mode-btn:hover:not(.active) {
      border-color: #a8dadc;
      color: #eee;
    }

    #difficulty-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
      color: #aaa;
    }

    #difficulty-row select {
      background: #16213e;
      color: #eee;
      border: 2px solid #0f3460;
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-size: 0.9rem;
      cursor: pointer;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken):not(.blocked) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.blocked { cursor: default; }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #reset {
      margin-top: 2rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      font-size: 1rem;
      color: #aaa;
    }

    #score span { font-weight: bold; }
    #score .sx { color: #e94560; }
    #score .so { color: #a8dadc; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="mode-select">
    <button class="mode-btn active" data-mode="2p">2 Players</button>
    <button class="mode-btn" data-mode="1p">vs Computer</button>
  </div>

  <div id="difficulty-row" style="display:none">
    Difficulty:
    <select id="difficulty">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard" selected>Hard</option>
    </select>
  </div>

  <div id="status">Player X's turn</div>
  <div id="board"></div>
  <button id="reset">New Game</button>

  <div id="score">
    <div id="label-x">X wins: <span class="sx" id="xwins">0</span></div>
    <div>Draws: <span id="draws">0</span></div>
    <div id="label-o">O wins: <span class="so" id="owins">0</span></div>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('reset');
    const xWinsEl = document.getElementById('xwins');
    const oWinsEl = document.getElementById('owins');
    const drawsEl = document.getElementById('draws');
    const diffRow = document.getElementById('difficulty-row');
    const diffSel = document.getElementById('difficulty');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let cells, current, gameOver, mode = '2p';
    let score = { X: 0, O: 0, D: 0 };

    // ── Mode buttons ──────────────────────────────────────────────
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mode = btn.dataset.mode;
        diffRow.style.display = mode === '1p' ? 'flex' : 'none';
        document.getElementById('label-x').innerHTML =
          `${mode === '1p' ? 'You (X)' : 'X'} wins: <span class="sx" id="xwins">${score.X}</span>`;
        document.getElementById('label-o').innerHTML =
          `${mode === '1p' ? 'CPU (O)' : 'O'} wins: <span class="so" id="owins">${score.O}</span>`;
        score = { X: 0, O: 0, D: 0 };
        init();
      });
    });

    diffSel.addEventListener('change', init);

    // ── Game logic ────────────────────────────────────────────────
    function init() {
      cells = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      statusEl.textContent = mode === '1p' ? "Your turn (X)" : "Player X's turn";
      renderBoard();
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      const cpuTurn = mode === '1p' && current === 'O';
      cells.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell'
          + (val ? ` ${val.toLowerCase()} taken` : '')
          + (cpuTurn || gameOver ? ' blocked' : '');
        cell.textContent = val || '';
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function handleClick(i) {
      if (gameOver || cells[i]) return;
      if (mode === '1p' && current === 'O') return;
      placeMove(i, current);
    }

    function placeMove(i, player) {
      cells[i] = player;
      renderBoard();

      const win = checkWin(cells);
      if (win) {
        win.forEach(idx => boardEl.children[idx].classList.add('win'));
        statusEl.textContent = mode === '1p'
          ? (player === 'X' ? 'You win!' : 'Computer wins!')
          : `Player ${player} wins!`;
        score[player]++;
        updateScore();
        gameOver = true;
        return;
      }
      if (cells.every(Boolean)) {
        statusEl.textContent = "It's a draw!";
        score.D++;
        updateScore();
        gameOver = true;
        return;
      }

      current = player === 'X' ? 'O' : 'X';

      if (mode === '1p' && current === 'O') {
        statusEl.textContent = "Computer is thinking...";
        renderBoard();
        setTimeout(cpuMove, 400);
      } else {
        statusEl.textContent = mode === '1p' ? "Your turn (X)" : `Player ${current}'s turn`;
      }
    }

    function cpuMove() {
      const diff = diffSel.value;
      let idx;
      if (diff === 'easy') {
        idx = randomMove();
      } else if (diff === 'medium') {
        idx = Math.random() < 0.5 ? bestMove() : randomMove();
      } else {
        idx = bestMove();
      }
      placeMove(idx, 'O');
    }

    function randomMove() {
      const empty = cells.map((v, i) => v ? null : i).filter(i => i !== null);
      return empty[Math.floor(Math.random() * empty.length)];
    }

    function bestMove() {
      let best = -Infinity, move = -1;
      cells.forEach((v, i) => {
        if (!v) {
          cells[i] = 'O';
          const score = minimax(cells, 0, false);
          cells[i] = null;
          if (score > best) { best = score; move = i; }
        }
      });
      return move;
    }

    function minimax(board, depth, isMax) {
      const win = checkWin(board);
      if (win) return isMax ? -10 + depth : 10 - depth;
      if (board.every(Boolean)) return 0;

      if (isMax) {
        let best = -Infinity;
        board.forEach((v, i) => {
          if (!v) {
            board[i] = 'O';
            best = Math.max(best, minimax(board, depth + 1, false));
            board[i] = null;
          }
        });
        return best;
      } else {
        let best = Infinity;
        board.forEach((v, i) => {
          if (!v) {
            board[i] = 'X';
            best = Math.min(best, minimax(board, depth + 1, true));
            board[i] = null;
          }
        });
        return best;
      }
    }

    function checkWin(board) {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    function updateScore() {
      document.getElementById('xwins').textContent = score.X;
      document.getElementById('owins').textContent = score.O;
      drawsEl.textContent = score.D;
    }

    resetBtn.addEventListener('click', init);
    init();
  </script>
</body>
</html>
